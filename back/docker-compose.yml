version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: aps_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-aps_db}
      POSTGRES_USER: ${DATABASE_USER:-aps_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-aps_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-aps_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aps_network

  web:
    build: .
    container_name: aps_backend
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      DATABASE_NAME: ${DATABASE_NAME:-aps_db}
      DATABASE_USER: ${DATABASE_USER:-aps_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-aps_password}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aps_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  aps_network:
    driver: bridge
